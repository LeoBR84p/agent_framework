<!-- LLM_CONTEXT: Firebase Google OAuth gate for AIz Intel framework. This page is PUBLIC (no auth required). On successful sign-in, validates the user's email against Firestore allowedUsers collection. Redirect destination is stored in ?return= query param. Do not add sidebar nav to this page. Keep it clean and centered. -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Sign In — PROJECT_NAME | AIz Intel">
  <meta property="og:description" content="Sign in to access the PROJECT_NAME knowledge base.">
  <title>Sign In — PROJECT_NAME | AIz Intel</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="assets/design_system.css">
  <link rel="stylesheet" href="assets/project_theme.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 60%), var(--bg);
    }
    .auth-wrapper {
      width: 100%;
      padding: var(--space-6);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .powered-by {
      margin-top: var(--space-8);
      font-size: var(--text-xs);
      color: var(--text-muted);
      text-align: center;
    }
    .google-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <img src="assets/logo.svg" alt="Project Logo" class="auth-logo" id="project-logo">

      <!-- Title -->
      <h1 class="auth-title" id="auth-project-name">PROJECT_NAME</h1>
      <p class="auth-subtitle">
        Secure knowledge base access.<br>
        Sign in with your authorized Google account to continue.
      </p>

      <!-- Sign In Button -->
      <button class="btn-google" onclick="signInWithGoogle()" id="signin-btn">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <!-- Error display -->
      <div class="auth-error" id="auth-error">
        <!-- Error messages rendered here by app.js -->
      </div>

      <div class="powered-by">
        Powered by <strong>AIz Intel</strong> · Proprietary Agentic Framework
      </div>
    </div>
  </div>

  <script>
    // FILL: Replace with your actual Firebase project configuration
    window.FIREBASE_CONFIG = {
      apiKey:            "FILL_API_KEY",
      authDomain:        "FILL_PROJECT_ID.firebaseapp.com",
      projectId:         "FILL_PROJECT_ID",
      storageBucket:     "FILL_PROJECT_ID.appspot.com",
      messagingSenderId: "FILL_SENDER_ID",
      appId:             "FILL_APP_ID"
    };
  </script>
  <script src="assets/app.js"></script>
  <script>
    // Load project name for display
    fetch('/project_config.json')
      .then(r => r.json())
      .then(data => {
        const name = data?.project?.name || 'PROJECT_NAME';
        document.getElementById('auth-project-name').textContent = name;
        document.title = 'Sign In — ' + name + ' | AIz Intel';
        const logo = data?.project?.logo;
        if (logo) document.getElementById('project-logo').src = logo;
      })
      .catch(() => {});
  </script>
</body>
</html>
