<!-- LLM_CONTEXT: JWT login gate for AIz Intel. PUBLIC page — no auth required. Submits username/password to POST /api/login, sets HttpOnly cookie, then redirects. No Firebase. -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AIz Intel</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="assets/design_system.css">
  <link rel="stylesheet" href="assets/project_theme.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 60%), var(--bg);
    }
    .auth-wrapper {
      width: 100%;
      max-width: 400px;
      padding: var(--space-6);
    }
    .auth-field {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }
    .auth-field label {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--text-secondary);
    }
    .auth-field input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: var(--text-base);
      padding: var(--space-3) var(--space-4);
      outline: none;
      transition: border-color var(--transition-fast);
      width: 100%;
      box-sizing: border-box;
    }
    .auth-field input:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px var(--brand-glow);
    }
    .btn-signin {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--brand-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      cursor: pointer;
      transition: opacity var(--transition-fast);
      margin-top: var(--space-2);
    }
    .btn-signin:hover  { opacity: 0.88; }
    .btn-signin:active { opacity: 0.75; }
    .btn-signin:disabled { opacity: 0.5; cursor: not-allowed; }
    .powered-by {
      margin-top: var(--space-8);
      font-size: var(--text-xs);
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <img src="assets/logo.svg" alt="Logo" class="auth-logo">
      <h1 class="auth-title" id="auth-project-name">AIz Intel</h1>
      <p class="auth-subtitle">Enter your credentials to access the workspace.</p>

      <form id="login-form" autocomplete="on">
        <div class="auth-field">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            placeholder="username"
            required
          >
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          >
        </div>
        <button class="btn-signin" type="submit" id="signin-btn">Sign In</button>
      </form>

      <div class="auth-error" id="auth-error"></div>

      <div class="powered-by">Powered by <strong>AIz Intel</strong> · Proprietary Agentic Framework</div>
    </div>
  </div>

  <script>
    // Load project name
    fetch('/project_config.json')
      .then(r => r.json())
      .then(d => {
        const name = d?.project?.name;
        if (name && name !== 'PROJECT_NAME') {
          document.getElementById('auth-project-name').textContent = name;
          document.title = 'Sign In — ' + name + ' | AIz Intel';
        }
        const logo = d?.project?.logo;
        if (logo) document.querySelector('.auth-logo').src = logo;
      })
      .catch(() => {});

    // Login form submission
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn     = document.getElementById('signin-btn');
      const errorEl = document.getElementById('auth-error');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      errorEl.textContent = '';
      errorEl.classList.remove('visible');

      try {
        const res = await fetch('/api/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });

        if (res.ok) {
          const params     = new URLSearchParams(window.location.search);
          const returnPath = params.get('return') || '/dashboard';
          window.location.href = returnPath;
        } else {
          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.error || 'Sign-in failed. Check your credentials.';
          errorEl.classList.add('visible');
          btn.disabled    = false;
          btn.textContent = 'Sign In';
        }
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.classList.add('visible');
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
